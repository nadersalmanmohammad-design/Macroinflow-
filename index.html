<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MacroInflow · Global Economic Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif; }
        body { background: #f4f7fc; padding: 20px; }
        .dashboard { max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 32px; padding: 24px 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); border: 1px solid #e6edf4; }
        h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #1a2a3f, #1f6392); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .subhead { color: #5b6e8c; border-left: 3px solid #2c7da0; padding-left: 14px; margin: 12px 0 28px 0; font-size: 0.9rem; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #4a627a; margin-bottom: 6px; }
        select, input, button { width: 100%; padding: 14px 18px; background: white; border: 1px solid #cfdee9; border-radius: 28px; font-size: 1rem; transition: 0.2s; }
        select:focus, input:focus, button:focus { outline: none; border-color: #2c7da0; box-shadow: 0 0 0 3px rgba(44,125,160,0.15); }
        button { background: #1f3b4c; color: white; border: none; font-weight: 600; cursor: pointer; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { background: #0f2a38; transform: translateY(-1px); }
        .quick-badges { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0 16px; }
        .badge { background: #eef3fa; padding: 8px 16px; border-radius: 40px; font-size: 0.8rem; font-weight: 500; color: #1f3b4c; cursor: pointer; border: 1px solid #cfdee9; transition: 0.1s; }
        .badge:active { transform: scale(0.97); }
        canvas { max-height: 400px; width: 100%; margin: 28px 0 20px; background: #ffffff; border-radius: 24px; }
        .stats-row { display: flex; flex-wrap: wrap; gap: 12px; margin: 16px 0 12px; }
        .stat-box { background: #f9fdfe; flex: 1; padding: 12px 8px; border-radius: 24px; text-align: center; border: 1px solid #e2edf2; }
        .stat-label { font-size: 0.7rem; color: #5f7f9c; }
        .stat-value { font-size: 1.4rem; font-weight: 700; color: #1f3b4c; line-height: 1.2; }
        .error-msg { background: #fff0f0; color: #b13e3e; padding: 14px; border-radius: 24px; margin: 16px 0; font-size: 0.85rem; text-align: center; }
        .info-note { background: #eef6fb; padding: 10px; border-radius: 20px; font-size: 0.7rem; color: #2c7da0; text-align: center; margin-top: 12px; }
        footer { text-align: center; font-size: 0.7rem; color: #7b95af; margin-top: 24px; }
        .loader { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (min-width: 640px) {
            .controls-grid { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
            .control-group { flex: 1; margin-bottom: 0; }
            button { flex: 0.5; margin-top: 0; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="card">
        <h1>🌍 MacroInflow · Global Dashboard</h1>
        <div class="subhead">Real-time economic indicators: GDP, Inflation, Unemployment, Fed Funds, 10Y Yield & more</div>

        <div class="controls-grid">
            <div class="control-group">
                <label>🌎 COUNTRY / REGION</label>
                <select id="countrySelect">
                    <option value="USA">🇺🇸 United States</option>
                    <option value="CAN">🇨🇦 Canada</option>
                    <option value="RUS">🇷🇺 Russia</option>
                    <option value="CHN">🇨🇳 China</option>
                    <option value="EA19">🇪🇺 Euro Area (19)</option>
                    <option value="SAU">🇸🇦 Saudi Arabia (GCC)</option>
                    <option value="ARE">🇦🇪 UAE (GCC)</option>
                    <option value="ISR">🇮🇱 Israel</option>
                </select>
            </div>
            <div class="control-group">
                <label>📊 INDICATOR</label>
                <select id="indicatorSelect">
                    <!-- dynamically populated -->
                </select>
            </div>
            <div class="control-group">
                <label>📅 YEARS (history)</label>
                <input type="number" id="yearsInput" value="10" min="1" max="25" step="1">
            </div>
            <button id="refreshBtn">📡 Refresh Data</button>
        </div>

        <div class="quick-badges" id="quickBadges"></div>

        <canvas id="macroChart" width="800" height="400"></canvas>
        <div id="statsPanel" class="stats-row"></div>
        <div id="errorMessage"></div>
        <div style="display: flex; justify-content: flex-end; margin-top: 12px;">
            <button id="exportCsvBtn" style="background: #2c5c6e; width: auto; padding: 10px 24px;">📎 Export CSV</button>
        </div>
        <div class="info-note" id="dataSourceNote">Data via FRED & World Bank — refreshed on demand.</div>
    </div>
    <footer>MacroInflow · one‑page utility | All data processed locally, no server</footer>
</div>

<script>
    // ======================== API & CONFIG ========================
    const FRED_API_KEY = "530b1ab07287b4e329429e87306ce44d";
    const CORS_PROXY = "https://cors-anywhere.herokuapp.com/";  // requires one-time demo access

    // Indicator definition list (display names and internal IDs)
    const INDICATORS = [
        { id: "GDP", label: "GDP (USD Billions)" },
        { id: "INFLATION", label: "Inflation (CPI, YoY %)" },
        { id: "UNEMPLOYMENT", label: "Unemployment Rate (%)" },
        { id: "INTEREST", label: "Policy Interest Rate (%)" },      // general for non-US
        { id: "FEDFUNDS", label: "Fed Funds Rate (%)" },            // US only
        { id: "TREASURY10Y", label: "10Y Treasury Yield (%)" },     // US only
        { id: "M2", label: "Money Supply M2 (Local Currency)" }
    ];

    // Country data source mapping
    const countryDataSource = {
        // USA - all via FRED, with FEDFUNDS and 10Y Treasury
        "USA": {
            source: "fred",
            indicators: {
                "GDP": "GDP",
                "INFLATION": "CPIAUCSL",
                "UNEMPLOYMENT": "UNRATE",
                "FEDFUNDS": "FEDFUNDS",
                "TREASURY10Y": "DGS10",
                "M2": "M2SL"
            }
        },
        // Canada via FRED
        "CAN": {
            source: "fred",
            indicators: {
                "GDP": "NAEXKP01CAQ189S",
                "INFLATION": "CANCPIALLQINMEI",
                "UNEMPLOYMENT": "LRUNTTTTCAQ156S",
                "INTEREST": "INTDSRCAM193N",
                "M2": "MANMM101CAM189S"
            }
        },
        // Russia via FRED
        "RUS": {
            source: "fred",
            indicators: {
                "GDP": "RUSGDPNQDSMEI",
                "INFLATION": "RUSCPIALLMINMEI",
                "UNEMPLOYMENT": "LRUNTTTTRUQ156S",
                "INTEREST": "INTDSRRUM193N",
                "M2": "RUSM2"
            }
        },
        // China via FRED
        "CHN": {
            source: "fred",
            indicators: {
                "GDP": "MKTGDPCNA646NWDB",
                "INFLATION": "CHNCPIALLMINMEI",
                "UNEMPLOYMENT": "LRUNTTTTCNQ156S",
                "INTEREST": "INTDSRCNM193N",
                "M2": "CHNM2SL"
            }
        },
        // Euro Area via FRED
        "EA19": {
            source: "fred",
            indicators: {
                "GDP": "CPMEURNSAB1GQEA19",
                "INFLATION": "CPALTT01EZM657N",
                "UNEMPLOYMENT": "LRHUTTTTEZQ156S",
                "INTEREST": "INTDSREZM193N",
                "M2": "MANMM101EZM189S"
            }
        },
        // Saudi Arabia – World Bank
        "SAU": {
            source: "worldbank",
            indicators: {
                "GDP": "NY.GDP.MKTP.CD",
                "INFLATION": "FP.CPI.TOTL.ZG",
                "UNEMPLOYMENT": "SL.UEM.TOTL.ZS"
            }
        },
        // UAE – World Bank
        "ARE": {
            source: "worldbank",
            indicators: {
                "GDP": "NY.GDP.MKTP.CD",
                "INFLATION": "FP.CPI.TOTL.ZG",
                "UNEMPLOYMENT": "SL.UEM.TOTL.ZS"
            }
        },
        // Israel – World Bank (plus interest rate)
        "ISR": {
            source: "worldbank",
            indicators: {
                "GDP": "NY.GDP.MKTP.CD",
                "INFLATION": "FP.CPI.TOTL.ZG",
                "UNEMPLOYMENT": "SL.UEM.TOTL.ZS",
                "INTEREST": "FR.INR.LEND"
            }
        }
    };

    // Helper: fetch FRED data
    async function fetchFRED(seriesId, startYear, endYear) {
        if (!seriesId) return null;
        const startDate = `${startYear}-01-01`;
        const endDate = `${endYear}-12-31`;
        let url = `https://api.stlouisfed.org/fred/series/observations?series_id=${seriesId}&api_key=${FRED_API_KEY}&file_type=json&observation_start=${startDate}&observation_end=${endDate}&sort_order=asc`;
        const proxied = CORS_PROXY + encodeURIComponent(url);
        const resp = await fetch(proxied);
        const text = await resp.text();
        const data = JSON.parse(text);
        if (data.error_message) throw new Error(data.error_message);
        const obs = data.observations || [];
        const result = [];
        for (let o of obs) {
            if (o.value && o.value !== ".") {
                let v = parseFloat(o.value);
                if (!isNaN(v)) result.push({ date: o.date, value: v });
            }
        }
        const map = new Map();
        for (let r of result) map.set(r.date, r.value);
        return Array.from(map.entries()).map(([date, value]) => ({ date, value })).sort((a,b) => new Date(a.date) - new Date(b.date));
    }

    // Helper: fetch World Bank indicator
    async function fetchWorldBank(countryCode, indicatorCode, startYear, endYear) {
        const url = `https://api.worldbank.org/v2/country/${countryCode}/indicator/${indicatorCode}?format=json&per_page=200&date=${startYear}:${endYear}`;
        const resp = await fetch(url);
        const data = await resp.json();
        if (!data || data.length < 2) return [];
        const records = data[1];
        const result = [];
        for (let rec of records) {
            if (rec.value !== null && rec.value !== "") {
                let val = parseFloat(rec.value);
                if (!isNaN(val)) result.push({ date: rec.date, value: val });
            }
        }
        result.sort((a,b) => new Date(a.date) - new Date(b.date));
        return result;
    }

    // Main data fetcher
    async function fetchIndicator(countryCode, indicatorId, startYear, endYear) {
        const config = countryDataSource[countryCode];
        if (!config) throw new Error("Country not supported");
        const seriesIdOrCode = config.indicators[indicatorId];
        if (!seriesIdOrCode) throw new Error(`Indicator ${indicatorId} not available for this country`);
        if (config.source === "fred") {
            return await fetchFRED(seriesIdOrCode, startYear, endYear);
        } else {
            return await fetchWorldBank(countryCode, seriesIdOrCode, startYear, endYear);
        }
    }

    // Dynamically populate indicator dropdown based on selected country
    function updateIndicatorDropdown(countryCode) {
        const config = countryDataSource[countryCode];
        const availIndicators = config ? Object.keys(config.indicators) : [];
        const indicatorSelect = document.getElementById("indicatorSelect");
        indicatorSelect.innerHTML = "";
        for (let ind of INDICATORS) {
            if (availIndicators.includes(ind.id)) {
                const option = document.createElement("option");
                option.value = ind.id;
                option.textContent = ind.label;
                indicatorSelect.appendChild(option);
            }
        }
        if (indicatorSelect.options.length === 0) {
            const opt = document.createElement("option");
            opt.value = "";
            opt.textContent = "No indicators available";
            indicatorSelect.appendChild(opt);
        }
    }

    let currentChart = null;
    let currentChartData = [];

    async function refreshDashboard() {
        const country = document.getElementById("countrySelect").value;
        const indicator = document.getElementById("indicatorSelect").value;
        if (!indicator) {
            showError("No indicator available for this country.");
            return;
        }
        const years = parseInt(document.getElementById("yearsInput").value, 10);
        const endYear = new Date().getFullYear();
        const startYear = endYear - years;
        const errorDiv = document.getElementById("errorMessage");
        errorDiv.innerHTML = "";
        const refreshBtn = document.getElementById("refreshBtn");
        refreshBtn.disabled = true;
        refreshBtn.innerHTML = `<span class="loader"></span> Loading...`;
        
        try {
            const data = await fetchIndicator(country, indicator, startYear, endYear);
            if (!data || data.length === 0) {
                throw new Error(`No data for ${country} / ${indicator} in the selected range.`);
            }
            currentChartData = data;
            
            const labels = data.map(d => d.date);
            const values = data.map(d => d.value);
            if (currentChart) currentChart.destroy();
            const ctx = document.getElementById("macroChart").getContext("2d");
            const countryName = document.getElementById("countrySelect").options[document.getElementById("countrySelect").selectedIndex].text;
            const indicatorLabel = document.getElementById("indicatorSelect").options[document.getElementById("indicatorSelect").selectedIndex]?.text || indicator;
            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `${countryName} · ${indicatorLabel}`,
                        data: values,
                        borderColor: '#2c7da0',
                        backgroundColor: 'rgba(44,125,160,0.05)',
                        borderWidth: 2.5,
                        pointRadius: 1.8,
                        tension: 0.2,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { tooltip: { mode: 'index' }, legend: { position: 'top' } }
                }
            });
            
            const latest = data[data.length-1];
            const first = data[0];
            const pctChange = ((latest.value - first.value) / first.value) * 100;
            document.getElementById("statsPanel").innerHTML = `
                <div class="stat-box"><div class="stat-label">Latest</div><div class="stat-value">${latest.value.toLocaleString()}</div><div style="font-size:0.7rem;">${latest.date}</div></div>
                <div class="stat-box"><div class="stat-label">Change</div><div class="stat-value">${pctChange > 0 ? '+' : ''}${pctChange.toFixed(1)}%</div><div style="font-size:0.7rem;">since ${first.date}</div></div>
                <div class="stat-box"><div class="stat-label">Observations</div><div class="stat-value">${data.length}</div></div>
            `;
            document.getElementById("dataSourceNote").innerHTML = `✅ Data source: ${countryDataSource[country]?.source === 'fred' ? 'FRED' : 'World Bank'} | Last updated: ${latest.date}`;
        } catch (err) {
            console.error(err);
            showError(`Failed to load: ${err.message}`);
            currentChartData = [];
            if (currentChart) currentChart.destroy();
            currentChart = null;
        } finally {
            refreshBtn.disabled = false;
            refreshBtn.innerHTML = `📡 Refresh Data`;
        }
    }

    function showError(msg) {
        const errorDiv = document.getElementById("errorMessage");
        errorDiv.innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
        document.getElementById("statsPanel").innerHTML = "";
    }

    function exportCSV() {
        if (!currentChartData || currentChartData.length === 0) {
            showError("No data to export. Refresh first.");
            return;
        }
        const country = document.getElementById("countrySelect").value;
        const indicator = document.getElementById("indicatorSelect").value;
        let csvRows = [["date", "value"]];
        for (let row of currentChartData) {
            csvRows.push([row.date, row.value]);
        }
        const csvContent = csvRows.map(r => r.join(",")).join("\n");
        const blob = new Blob([csvContent], { type: "text/csv" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `${country}_${indicator}_macro.csv`;
        link.click();
        URL.revokeObjectURL(url);
    }

    // Event handlers
    document.getElementById("countrySelect").addEventListener("change", (e) => {
        const newCountry = e.target.value;
        updateIndicatorDropdown(newCountry);
    });
    document.getElementById("refreshBtn").addEventListener("click", refreshDashboard);
    document.getElementById("exportCsvBtn").addEventListener("click", exportCSV);
    
    // Quick badges (shortcuts for indicators)
    const badgesDiv = document.getElementById("quickBadges");
    // Show only the most common ones to avoid clutter
    const quickIndicators = ["GDP", "INFLATION", "UNEMPLOYMENT", "FEDFUNDS", "TREASURY10Y"];
    quickIndicators.forEach(indId => {
        const ind = INDICATORS.find(i => i.id === indId);
        if (ind) {
            const badge = document.createElement("span");
            badge.className = "badge";
            badge.innerText = ind.label.split(" ")[0];
            badge.title = ind.label;
            badge.onclick = () => {
                const currentCountry = document.getElementById("countrySelect").value;
                const avail = Object.keys(countryDataSource[currentCountry]?.indicators || {});
                if (avail.includes(indId)) {
                    document.getElementById("indicatorSelect").value = indId;
                    // Optionally auto-refresh? We keep manual, but user can click refresh.
                } else {
                    showError(`Indicator ${ind.label} not available for selected country.`);
                }
            };
            badgesDiv.appendChild(badge);
        }
    });
    
    // Initial load: USA, GDP
    updateIndicatorDropdown("USA");
    document.getElementById("countrySelect").value = "USA";
    document.getElementById("indicatorSelect").value = "GDP";
    refreshDashboard();
</script>
</body>
</html>
